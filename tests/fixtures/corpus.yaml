# Scenehound matching corpus — the accuracy ratchet.
# Every production mismatch gets appended here as a regression test.
# expect: match => confidence >= 75; no_match => confidence < 75.

- release: "ThatFetishGirl.26.07.07.Latex.Worship.Session.XXX.1080p.MP4-GRP"
  scene: &latex
    site: "That Fetish Girl"
    aliases: ["TFG"]
    date: 2026-07-07
    title: "Latex Worship Session"
    performers: ["Jane Doe", "Mary Major"]
  expect: match

- release: "Jane Doe & Mary Major - Latex Worship (07.07.2026) 2160p"
  scene: *latex
  expect: match

- release: "TFG - Latex Worship Session [1080]"        # site alias + title, no date
  scene: *latex
  expect: match

- release: "Jane.Doe.Latex.Worship.Session.720p"        # performer + title, no site/date
  scene: *latex
  expect: match

- release: "ThatFetishGirl.Compilation.Best.Of.2025"    # site only, wrong content
  scene: *latex
  expect: no_match

- release: "Unrelated.Studio.2026-07-07.Random.Clip"    # date only
  scene: *latex
  expect: no_match

- release: "OtherStudio.26.07.07.Latex.Worship.Session"
  scene: *latex
  other_sites: ["Other Studio"]
  expect: no_match

- release: "ThatFetishGirl.2024-01-01.Latex.Worship.Session"  # contradicting date
  scene: *latex
  expect: no_match

- release: "Scott Stark Studios - Beach Day 05.07.2026 1080p"
  scene:
    site: "Scott Stark Studios"
    aliases: []
    date: 2026-07-05
    title: "Beach Day"
    performers: ["Alex Roe"]
  expect: match

# --- matcher hardening regressions (review-found false positives + one positive) ---

- release: "ThatFetishGirl.Casting.Couch.Special.Edition.1080p"   # generic 1-word title, same site, no date
  scene:
    site: "That Fetish Girl"
    date: 2026-07-07
    title: "Casting"
  expect: no_match

- release: "SomeOtherStudio.2026.07.07.Maintenance.Training.Bonus.1080p"  # short performer names inside words
  scene:
    site: "Some Site"
    date: 2026-07-07
    title: "Whatever"
    performers: ["Ai", "Bo"]
  expect: no_match

- release: "Brazzers.2026.07.07.Vixens.Live.In.Latex.1080p"       # short site inside a longer word (Vixen/Vixens)
  scene:
    site: "Vixen"
    date: 2026-07-07
    title: "Some Scene"
  expect: no_match

- release: "WrongStudio.2026.07.07.Public.Agents.Report.1080p"    # fuzzy-site plural coincidence (PublicAgent/Public Agents)
  scene:
    site: "PublicAgent"
    date: 2026-07-07
    title: "Some Scene"
  expect: no_match

- release: "Jane.ONeil.Latex.Worship.Session.720p"                # punctuated performer name still matches (perf+title)
  scene:
    site: "Some Site"
    date: 2026-07-07
    title: "Latex Worship Session"
    performers: ["Jane O'Neil"]
  expect: match

# --- decorative "xxx" studio-suffix asymmetry (both directions) ---
# The `aliases` here are exactly what whisparr.scene_from_record now auto-generates
# via normalize.xxx_site_variant. site+title is the load-bearing strong pair, so the
# match hangs entirely on the toggled site spelling matching the release.

- release: "[FamilyTherapy] The Massage Lesson 1080p"   # Whisparr has "…XXX", Empornium doesn't; undated
  scene:
    site: "Family Therapy XXX"
    aliases: ["Family Therapy"]
    date: 2026-07-07
    title: "The Massage Lesson"
    performers: ["Jane Doe"]
  expect: match

- release: "FamilyTherapyXXX.26.07.07.Bonus.Scene.XXX.1080p"   # reverse: Whisparr bare, tracker has "…XXX"; date+site
  scene:
    site: "Family Therapy"
    aliases: ["Family Therapy XXX"]
    date: 2026-07-07
    title: "The Massage Lesson"
    performers: ["Jane Doe"]
  expect: match
