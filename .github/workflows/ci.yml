name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; the image job opts into packages:write.
permissions:
  contents: read

jobs:
  test:
    name: Test (pytest, py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (runtime + dev)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Audits the declared dependency tree for known CVEs. Runs independently of
      # the image build so an unfixable transitive advisory surfaces loudly without
      # blocking image delivery.
      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: .

  image:
    name: Build & push image (GHCR)
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR using the built-in GITHUB_TOKEN (no secrets needed)
    steps:
      - uses: actions/checkout@v7

      # GHCR requires a lowercase path; github.repository ("Espionage9248/Scenehound")
      # is mixed-case, so lowercase it once here and reuse everywhere.
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      # Push on main pushes and version tags; PRs build only (validates the
      # Dockerfile) since fork PRs can't and shouldn't push packages.
      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64   # Unraid is x86; add linux/arm64 here if ever needed
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Report-only: prints HIGH/CRITICAL (fixable) CVEs in the built image to the
      # run log. Not uploaded as SARIF — code scanning needs GitHub Advanced Security
      # on a private repo. If you enable GHAS or make the repo public, switch
      # `format: table` -> `format: sarif` + add a github/codeql-action/upload-sarif step.
      - name: Scan image (Trivy, report-only)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
